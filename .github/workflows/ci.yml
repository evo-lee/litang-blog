name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
      NEXT_PUBLIC_ENABLE_UMAMI: ${{ vars.NEXT_PUBLIC_ENABLE_UMAMI || 'true' }}
      NEXT_PUBLIC_ENABLE_GA: ${{ vars.NEXT_PUBLIC_ENABLE_GA || 'true' }}
      NEXT_PUBLIC_ENABLE_HETI: ${{ vars.NEXT_PUBLIC_ENABLE_HETI || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint Content
        run: npm run lint:content

      - name: Lint Source
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Type Check
        run: npm run type-check

      - name: Build Next App
        run: npm run build

      - name: Generate Build Report
        run: node --import tsx scripts/ci/build-report.ts

      - name: Upload Build Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: reports/build/
          if-no-files-found: error

      - name: Build Cloudflare Worker
        run: npm run cf:build
