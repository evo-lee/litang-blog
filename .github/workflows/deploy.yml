name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
      NEXT_PUBLIC_ENABLE_UMAMI: ${{ vars.NEXT_PUBLIC_ENABLE_UMAMI || 'true' }}
      NEXT_PUBLIC_ENABLE_GA: ${{ vars.NEXT_PUBLIC_ENABLE_GA || 'true' }}
      NEXT_PUBLIC_ENABLE_HETI: ${{ vars.NEXT_PUBLIC_ENABLE_HETI || 'true' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint Content
        run: npm run lint:content

      - name: Lint Source
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Build Next App
        run: npm run build

      - name: Build Cloudflare Worker
        run: npm run cf:build

      - name: Deploy Worker
        run: npm run cf:deploy

      - name: Verify Health Endpoint
        run: curl --fail --show-error --silent https://evolee-x.workers.dev/api/health
