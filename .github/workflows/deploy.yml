name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Build-time public variables baked into the bundle.
      # Source of truth: GitHub repo Variables (Settings → Secrets and variables → Actions → Variables).
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
      NEXT_PUBLIC_ENABLE_UMAMI: ${{ vars.NEXT_PUBLIC_ENABLE_UMAMI || 'true' }}
      NEXT_PUBLIC_ENABLE_GA: ${{ vars.NEXT_PUBLIC_ENABLE_GA || 'true' }}
      NEXT_PUBLIC_ENABLE_HETI: ${{ vars.NEXT_PUBLIC_ENABLE_HETI || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build (OpenNext + Next.js)
        run: npm run cf:build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
